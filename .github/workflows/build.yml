name: ECR image build / publish

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: hitechcloud-vietnam/nvidia-license-server-exporter
  IMAGE_SHA: ${{ github.sha }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ECR_PUSHER }}
          aws-region: us-east-1

      - name: Log in to ECR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR image tags
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: ecr-tags
        env:
          ECR_IMAGE: ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}
        run: |
          {
            echo "tags<<EOF"
            echo "${ECR_IMAGE}:sha-${IMAGE_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${ECR_IMAGE}:main"
            fi
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              echo "${ECR_IMAGE}:pr-${{ github.event.pull_request.number }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMAGE_NAME }}:sha-${{ env.IMAGE_SHA }}

      - name: Build and push image to ECR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr-tags.outputs.tags }}
